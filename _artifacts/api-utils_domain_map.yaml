library:
  name: '@wisemen/vue-core-api-utils'
  version: '0.0.3'
  repository: 'https://github.com/wisemen-digital/wisemen-core'
  description: 'Type-safe Vue 3 composables for API data fetching built on TanStack Query with structured error handling via AsyncResult'
  primary_framework: 'Vue 3'

domains:
  - name: 'Type-Safe Result Handling'
    slug: 'result-handling'
    description: 'Understanding the three-state AsyncResult type and exhaustive pattern matching for queries and mutations'
  
  - name: 'Data Fetching & Caching'
    slug: 'data-fetching'
    description: 'Querying single and paginated data with automatic caching, staleness, and refetch strategies'
  
  - name: 'State Mutations & Cache Synchronization'
    slug: 'mutations-cache'
    description: 'Creating, updating, deleting data via mutations and keeping the cache in sync with server state'
  
  - name: 'Performance Optimization'
    slug: 'performance'
    description: 'Prefetching, optimistic updates, and building responsive UIs without unnecessary refetches'
  
  - name: 'Library Foundations'
    slug: 'foundations'
    description: 'How AsyncResult (neverthrow) and @tanstack/vue-query underpin the library'

skills:
  - name: 'Getting Started'
    slug: 'getting-started'
    domain: 'result-handling'
    type: 'lifecycle'
    description: 'Install, initialize the plugin, define typed query keys, create your API composables'
    packages:
      - '@wisemen/vue-core-api-utils'
    covers:
      - 'initializeApiUtils()'
      - 'createApiUtils<TQueryKeys, TErrorCode>()'
      - 'ProjectQueryKeys interface'
      - 'QueryKeys type structure'
      - 'Plugin setup and initialization'
      - 'API composable factory creation'
    tasks:
      - 'Install the package'
      - 'Initialize Vue Query plugin'
      - 'Create typed query keys interface'
      - 'Create API composables with error codes'
      - 'Export typed result types'
    failure_modes:
      - mistake: 'Forget to initialize apiUtilsPlugin with QueryClient config'
        mechanism: 'Throws: "[api-utils] QueryClient not available. Call initializeApiUtils(queryClient) before using createApiUtils()."'
        wrong_pattern: |
          // main.ts
          const app = createApp(App)
          // Forgot to pass QueryClient config!
          app.mount('#app')
        correct_pattern: |
          // main.ts
          import { apiUtilsPlugin } from '@wisemen/vue-core-api-utils'
          
          const app = createApp(App)
          app.use(apiUtilsPlugin({
            defaultOptions: {
              queries: { staleTime: 1000 * 60 * 5 },
            },
          }))
          app.mount('#app')
        source: 'source code: config.ts getQueryClient() assertion'
        priority: 'CRITICAL'
        status: 'active'
        version_context: 'All versions'
      
      - mistake: 'Define query keys interface without strict entity/params structure'
        mechanism: 'Type checking succeeds but runtime behavior is unpredictable; params dont map correctly to query keys'
        wrong_pattern: |
          // Wrong: mixing string keys with structured config
          export interface ProjectQueryKeys {
            userDetail: { entity: User } // Missing params!
            userList: User[] // Not structured as { entity, params }
          }
        correct_pattern: |
          // Correct: every key has both entity and params
          export interface ProjectQueryKeys {
            userDetail: {
              entity: User
              params: { userId: string }
            }
            userList: {
              entity: User[]
              params: { page: number; limit: number }
            }
          }
        source: 'docs: installation.md section 3'
        priority: 'HIGH'
        status: 'active'
        version_context: 'All versions'

  - name: 'Handling AsyncResult Types'
    slug: 'asyncresult-handling'
    domain: 'result-handling'
    type: 'core'
    description: 'Understanding three states (Loading, Ok, Err), pattern matching, and extracting values safely'
    packages:
      - '@wisemen/vue-core-api-utils'
    covers:
      - 'AsyncResult<T, E> type'
      - 'isLoading(), isOk(), isErr() predicates'
      - 'getValue(), getError() accessors'
      - 'match() pattern matching'
      - 'map(), mapErr() transformations'
      - 'unwrapOr() fallback'
      - 'ApiError<TErrorCode> structure'
    tasks:
      - 'Check query/mutation loading state'
      - 'Render UI conditionally based on result state'
      - 'Extract values after checking isOk()'
      - 'Handle errors after checking isErr()'
      - 'Use exhaustive pattern matching'
      - 'Transform results with map/mapErr'
    failure_modes:
      - mistake: 'Forget to check state before calling getValue/getError'
        mechanism: 'Returns null/undefined; doesnt throw but UI displays nothing or errors'
        wrong_pattern: |
          // Wrong: getValue without isOk check
          const { result } = useQuery('userDetail', ...)
          const user = result.value.getValue() // Unsafe!
          console.log(user.name) // user could be undefined
        correct_pattern: |
          // Correct: exhaustive state check first
          if (result.value.isOk()) {
            const user = result.value.getValue()
            console.log(user.name) // safe!
          }
        source: 'docs: result-types.md, query.md examples'
        priority: 'CRITICAL'
        status: 'active'
        version_context: 'All versions'
      
      - mistake: 'Not handle all three states in match()'
        mechanism: 'Only rendering for ok and err states; loading state shows nothing'
        wrong_pattern: |
          // Wrong: missing loading handler
          result.value.match({
            ok: (data) => renderData(data),
            err: (error) => renderError(error),
            // Forgot loading!
          })
        correct_pattern: |
          // Correct: handle all three
          result.value.match({
            loading: () => renderSpinner(),
            ok: (data) => renderData(data),
            err: (error) => renderError(error),
          })
        source: 'docs: result-types.md pattern matching section'
        priority: 'HIGH'
        status: 'active'
        version_context: 'All versions'
      
      - mistake: 'Use state flags (isLoading, isError, isSuccess) inconsistently with AsyncResult'
        mechanism: 'Composables export both AsyncResult and individual flags; mixing them causes logic bugs'
        wrong_pattern: |
          // Wrong: using flag instead of result state
          const { result, isLoading } = useQuery(...)
          if (isLoading.value) {
            // ...
          } else {
            const data = result.value.getValue() // could be null!
          }
        correct_pattern: |
          // Correct: use result state exclusively
          const { result } = useQuery(...)
          if (result.value.isLoading()) {
            // ...
          } else if (result.value.isOk()) {
            const data = result.value.getValue()
            // ...
          }
        source: 'maintainer interview; docs mix old flags with result'
        priority: 'HIGH'
        status: 'active'
        version_context: 'All versions'

  - name: 'Writing Queries'
    slug: 'writing-queries'
    domain: 'data-fetching'
    type: 'core'
    description: 'Fetch single resources with caching, parameter reactivity, and stale-time configuration'
    packages:
      - '@wisemen/vue-core-api-utils'
    covers:
      - 'useQuery(key, options)'
      - 'params as computed refs'
      - 'staleTime configuration'
      - 'queryFn()'
      - 'refetch() method'
      - 'isFetching vs isLoading'
    tasks:
      - 'Fetch a single entity by ID'
      - 'Set cache expiry for domain data'
      - 'React to parameter changes (ID changes)'
      - 'Manually refetch on demand'
      - 'Separate loading (first fetch) from background refetch'
    failure_modes:
      - mistake: 'Import useQuery from @tanstack/vue-query instead of from api-utils factory'
        mechanism: 'Bypasses type safety, AsyncResult wrapping, and error code typing; loses cache integration'
        wrong_pattern: |
          // Wrong: using TanStack directly
          import { useQuery } from '@tanstack/vue-query'
          
          const { data, error, isLoading } = useQuery({
            queryKey: ['userDetail', userId.value],
            queryFn: () => UserService.getById(userId.value),
          })
        correct_pattern: |
          // Correct: use pre-configured composable from factory
          import { useQuery } from '@/api' // From createApiUtils factory
          
          const { result, isLoading } = useQuery('userDetail', {
            params: { userId },
            queryFn: () => UserService.getById(userId.value),
          })
        source: 'library architecture; factory pattern'
        priority: 'CRITICAL'
        status: 'active'
        version_context: 'All versions'
      
      - mistake: 'Use plain ref for params instead of computed'
        mechanism: 'Query doesnt watch param changes; cache remains stale when ID changes'
        wrong_pattern: |
          // Wrong: plain ref doesn't trigger refetch
          const userId = ref('123')
          const { result } = useQuery('userDetail', {
            params: { userId }, // plain ref, not computed
            queryFn: () => UserService.getById(userId.value),
          })
          // Later: userId.value = '456' // Query does NOT refetch!
        correct_pattern: |
          // Correct: use computed so query watches changes
          const userId = computed(() => props.userId)
          const { result } = useQuery('userDetail', {
            params: { userId },
            queryFn: () => UserService.getById(userId.value),
          })
        source: 'docs: query.md usage example'
        priority: 'HIGH'
        status: 'active'
        version_context: 'All versions'
      
      - mistake: 'Not set staleTime; serve stale cache indefinitely'
        mechanism: 'Default staleTime is 0; cache is immediately stale; background refetch on every interaction'
        wrong_pattern: |
          // Wrong: no staleTime; background refetch constantly
          const { result } = useQuery('userDetail', {
            params: { userId: computed(() => '123') },
            queryFn: () => UserService.getById('123'),
            // staleTime defaults to 0 --- cache is immediately stale!
          })
        correct_pattern: |
          // Correct: set staleTime to reasonable value
          const { result } = useQuery('userDetail', {
            params: { userId: computed(() => '123') },
            queryFn: () => UserService.getById('123'),
            staleTime: 1000 * 60 * 5, // 5 minutes
          })
        source: 'docs: installation.md setup section; Vue Query best practices'
        priority: 'HIGH'
        status: 'active'
        version_context: 'All versions'
      
      - mistake: 'Confuse isFetching with isLoading'
        mechanism: 'isLoading only true on initial load; isFetching true whenever fetching (including background); UI logic breaks'
        wrong_pattern: |
          // Wrong: waiting for isLoading instead of result state
          const { result, isLoading } = useQuery(...)
          if (isLoading.value) {
            return // Exits immediately after first load!
          }
          // This executes even while refetching
        correct_pattern: |
          // Correct: use result state for conditional rendering
          const { result } = useQuery(...)
          if (result.value.isLoading()) {
            return // True only on initial load
          }
          // Use isFetching separately if you want background fetch indicator
        source: 'docs: query.md return values section'
        priority: 'MEDIUM'
        status: 'active'
        version_context: 'All versions'

  - name: 'Writing Infinite Queries'
    slug: 'writing-infinitequeries'
    domain: 'data-fetching'
    type: 'core'
    description: 'Paginate with offset (page-based) or keyset (cursor-based) strategies, handle infinite scroll'
    packages:
      - '@wisemen/vue-core-api-utils'
    covers:
      - 'useOffsetInfiniteQuery(key, options)'
      - 'useKeysetInfiniteQuery(key, options)'
      - 'Offset pagination: page/limit'
      - 'Keyset pagination: cursor/limit'
      - 'fetchNextPage()'
      - 'hasNextPage computed'
      - 'isFetchingNextPage flag'
      - 'Paginated result structure: data + meta'
    subsystems:
      - name: 'Offset Pagination'
        config_surface: 'page, limit parameters; returns total count in meta'
      - name: 'Keyset Pagination'
        config_surface: 'limit and cursor in meta.next; best for large/real-time data'
    tasks:
      - 'Fetch initial page of data'
      - 'Load next page on button click'
      - 'Detect if more pages exist'
      - 'Avoid refetch when query params change (use resetPagination when needed)'
      - 'Handle empty results'
      - 'Use larger limits for performance (not page=1,limit=1)'
    failure_modes:
      - mistake: 'Import useInfiniteQuery from @tanstack/vue-query instead of factory'
        mechanism: 'Loses AsyncResult wrapping, type safety, and integration with typed query keys'
        wrong_pattern: |
          // Wrong: using TanStack directly
          import { useInfiniteQuery } from '@tanstack/vue-query'
          
          const { data, error } = useInfiniteQuery({
            queryKey: ['userList'],
            queryFn: ({ pageParam = 0 }) => UserService.getAll({ page: pageParam }),
            getNextPageParam: (lastPage) => lastPage.nextCursor,
          })
        correct_pattern: |
          // Correct: use factory-provided composable
          import { useOffsetInfiniteQuery } from '@/api'
          
          const { result, fetchNextPage } = useOffsetInfiniteQuery('userList', {
            params: { search: computed(() => searchTerm.value) },
            queryFn: (pagination) => UserService.getAll({
              page: pagination.pageParam,
              limit: pagination.limit,
            }),
          })
        source: 'library architecture; factory pattern'
        priority: 'CRITICAL'
        status: 'active'
        version_context: 'All versions'
      
      - mistake: 'Return paginated data without wrapping in data/meta structure'
        mechanism: 'QueryClient doesn't know how to append pages; pages overwrite instead of concat'
        wrong_pattern: |
          // Wrong: returning array directly
          const { result } = useOffsetInfiniteQuery('userList', {
            queryFn: (pagination) => UserService.getAll({
              page: pagination.pageParam,
              limit: pagination.limit,
            }), // Returns User[] directly
          })
        correct_pattern: |
          // Correct: return { data: User[], meta: { ... } }
          const { result } = useOffsetInfiniteQuery('userList', {
            queryFn: (pagination) => UserService.getAll({
              page: pagination.pageParam,
              limit: pagination.limit,
            }).then(data => ({
              data,
              meta: { page: pagination.pageParam, limit: pagination.limit, total: 100 }
            })),
          })
        source: 'docs: paginated-query.md handling pagination results'
        priority: 'CRITICAL'
        status: 'active'
        version_context: 'All versions'
      
      - mistake: 'Mix offset and keyset pagination patterns in same query'
        mechanism: 'Page/cursor mismatches; pagination breaks or resets unexpectedly'
        wrong_pattern: |
          // Wrong: mixing patterns
          const { result } = useOffsetInfiniteQuery('userList', {
            queryFn: (pagination) => UserService.getAllKeyset({
              cursor: pagination.pageParam, // offset expects page number!
              limit: pagination.limit,
            }),
          })
        correct_pattern: |
          // Correct: use right composable/API for strategy
          // Offset: useOffsetInfiniteQuery with page/limit
          const { result } = useOffsetInfiniteQuery('userList', {
            queryFn: (pagination) => UserService.getAll({
              page: pagination.pageParam,
              limit: pagination.limit,
            }),
          })
          // OR Keyset: useKeysetInfiniteQuery with cursor
          const { result } = useKeysetInfiniteQuery('userList', {
            queryFn: (pagination) => UserService.getAllKeyset({
              cursor: pagination.pageParam,
              limit: pagination.limit,
            }),
          })
        source: 'docs: paginated-query.md offset vs keyset comparison'
        priority: 'HIGH'
        status: 'active'
        version_context: 'All versions'
      
      - mistake: 'Forget isFetchingNextPage flag; show loading on first page load'
        mechanism: 'Button appears disabled while loading more, not just while fetching next'
        wrong_pattern: |
          // Wrong: using isFetching on load-more button
          const { result, isFetching, fetchNextPage } = useOffsetInfiniteQuery(...)
          <button @click="fetchNextPage" :disabled="isFetching">
            {{ isFetching ? 'Loading...' : 'Load More' }}
          </button>
          // Button disabled on initial load too!
        correct_pattern: |
          // Correct: use isFetchingNextPage for load-more button
          const { result, isFetchingNextPage, fetchNextPage } = useOffsetInfiniteQuery(...)
          <button @click="fetchNextPage" :disabled="isFetchingNextPage">
            {{ isFetchingNextPage ? 'Loading...' : 'Load More' }}
          </button>
        source: 'docs: paginated-query.md return values'
        priority: 'MEDIUM'
        status: 'active'
        version_context: 'All versions'

  - name: 'Writing Mutations'
    slug: 'writing-mutations'
    domain: 'mutations-cache'
    type: 'core'
    description: 'Create, update, delete resources; handle side effects; invalidate related queries'
    packages:
      - '@wisemen/vue-core-api-utils'
    covers:
      - 'useMutation(options)'
      - 'execute() method'
      - 'queryFn request shape (body, params)'
      - 'queryKeysToInvalidate'
      - 'Error handling via AsyncResult'
      - 'isLoading computed'
    tasks:
      - 'Execute a create/update/delete operation'
      - 'Invalidate related queries after success'
      - 'Selective invalidation (specific record vs all)'
      - 'Handle mutation errors'
      - 'Wait for mutation before navigating'
    failure_modes:
      - mistake: 'Import useMutation from @tanstack/vue-query instead of factory'
        mechanism: 'Loses AsyncResult wrapping, type-safe queryKeysToInvalidate, and error code typing'
        wrong_pattern: |
          // Wrong: using TanStack directly
          import { useMutation } from '@tanstack/vue-query'
          
          const mutation = useMutation({
            mutationFn: async (data) => ContactService.create(data),
            onSuccess: () => {
              queryClient.invalidateQueries({ queryKey: ['contactList'] })
            },
          })
        correct_pattern: |
          // Correct: use factory-provided composable
          import { useMutation } from '@/api'
          
          const { execute, result } = useMutation({
            queryFn: async (options: { body: ContactCreateForm }) => {
              return await ContactService.create(options.body)
            },
            queryKeysToInvalidate: {
              contactList: {},
            },
          })
        source: 'library architecture; factory pattern'
        priority: 'CRITICAL'
        status: 'active'
        version_context: 'All versions'
      
      - mistake: 'Forget to list queryKeysToInvalidate; cache becomes stale'
        mechanism: 'Mutation succeeds but query still shows old data; UI out of sync'
        wrong_pattern: |
          // Wrong: no queryKeysToInvalidate
          const { execute } = useMutation({
            queryFn: async (options: { body: ContactCreateForm }) => {
              return await ContactService.create(options.body)
            },
            // Forgot queryKeysToInvalidate!
          })
        correct_pattern: |
          // Correct: invalidate affected queries
          const { execute } = useMutation({
            queryFn: async (options: { body: ContactCreateForm }) => {
              return await ContactService.create(options.body)
            },
            queryKeysToInvalidate: {
              contactList: {}, // Invalidate all contactList queries
            },
          })
        source: 'docs: mutation.md create mutation example'
        priority: 'CRITICAL'
        status: 'active'
        version_context: 'All versions'
      
      - mistake: 'Not await execute(); code runs before mutation completes'
        mechanism: 'Navigation happens before response; form submits but redirects immediately'
        wrong_pattern: |
          // Wrong: fire and forget
          async function handleSubmit() {
            execute({ body: formData })
            router.push('/contact/list') // Redirects before mutation finishes!
          }
        correct_pattern: |
          // Correct: await the result
          async function handleSubmit() {
            const result = await execute({ body: formData })
            if (result.isOk()) {
              router.push('/contact/list')
            }
          }
        source: 'docs: mutation.md usage example'
        priority: 'HIGH'
        status: 'active'
        version_context: 'All versions'
      
      - mistake: 'Use body instead of params for query parameters'
        mechanism: 'Query params sent in request body instead of URL; backend rejects'
        wrong_pattern: |
          // Wrong: filter/search as body
          const { execute } = useMutation({
            queryFn: async (options) => {
              // options.body has the params, but backend expects URL params
              return await SearchService.search(options.body)
            },
          })
        correct_pattern: |
          // Correct: separate body and params
          const { execute } = useMutation({
            queryFn: async (options) => {
              const { body, params } = options
              return await SearchService.search(params)
            },
          })
        source: 'source code: mutation composable request shape'
        priority: 'HIGH'
        status: 'active'
        version_context: 'All versions'

  - name: 'Cache Management'
    slug: 'cache-management'
    domain: 'mutations-cache'
    type: 'core'
    description: 'Manual cache reads/writes with useQueryClient; invalidate specific queries; optimistic updates'
    packages:
      - '@wisemen/vue-core-api-utils'
    covers:
      - 'useQueryClient()'
      - 'get(queryKey)'
      - 'set(queryKey, data)'
      - 'update(queryKey, { by, value })'
      - 'invalidate(queryKey)'
      - 'Predicate-based updates'
    tasks:
      - 'Check cached data before fetching'
      - 'Manually update cache after mutation'
      - 'Update list items matching a predicate'
      - 'Invalidate specific query variants'
      - 'Clear cache on logout'
    failure_modes:
      - mistake: 'Call update/set without checking data structure (array vs entity)'
        mechanism: 'Update logic fails silently or throws; cache not updated'
        wrong_pattern: |
          // Wrong: treating list like single entity
          const queryClient = useQueryClient()
          queryClient.update('contactList', {
            by: (contact) => contact.id === '123', // contacts is array
            value: (contact) => ({ ...contact, name: 'Updated' }),
          })
          // QueryClient doesn't know if entity is Contact or Contact[]!
        correct_pattern: |
          // Correct: QueryClient infers entity type from query key
          const queryClient = useQueryClient()
          // If contactList: { entity: Contact[], ... }
          // QueryClient knows to iterate the array
          queryClient.update('contactList', {
            by: (contact) => contact.id === '123',
            value: (contact) => ({ ...contact, name: 'Updated' }),
          })
        source: 'docs: query-client.md usage'
        priority: 'HIGH'
        status: 'active'
        version_context: 'All versions'
      
      - mistake: 'Call set() without async loading state; UI flashes stale data'
        mechanism: 'Optimistic update writes, but result.value.isLoading() is false; looks wrong'
        wrong_pattern: |
          // Wrong: immediate set without loading indicator
          queryClient.set(['contactDetail', { id }], data)
          // Cache updated but no indicator that request is pending
        correct_pattern: |
          // Correct: set cache, then show loading UI via AsyncResult
          // Either: dont update optimistically, just invalidate
          queryClient.invalidate('contactDetail')
          // Or: update optimistically AND handle rollback
          queryClient.set(['contactDetail', { id }], data)
          const result = await execute(formData)
          if (result.isErr()) {
            queryClient.set(['contactDetail', { id }], originalData) // Rollback
          }
        source: 'docs: query-client.md real-world example'
        priority: 'MEDIUM'
        status: 'active'
        version_context: 'All versions'

  - name: 'Building Optimistic UIs'
    slug: 'optimistic-uis'
    domain: 'performance'
    type: 'composition'
    description: 'Combine mutations + optimistic cache updates + AsyncResult to create responsive apps without refetching'
    packages:
      - '@wisemen/vue-core-api-utils'
    covers:
      - 'Optimistic update pattern'
      - 'Rollback on error'
      - 'Combining useQuery + useMutation + useQueryClient'
      - 'AsyncResult state for conditional rendering'
      - 'Fast feedback loops'
    tasks:
      - 'Update cache immediately on form submit'
      - 'Revert UI if server rejects'
      - 'Show temporary loading state during request'
      - 'Avoid refetch; send minimal cache update'
      - 'Build forms that feel instant'
    failure_modes:
      - mistake: 'Optimistic update without rollback; errors leave wrong data in cache'
        mechanism: 'User sees success feedback but data is wrong; refresh shows correct data'
        wrong_pattern: |
          // Wrong: no rollback
          async function handleUpdate() {
            const original = queryClient.get(['contactDetail', { id }])
            queryClient.update(['contactDetail', { id }], {
              by: (item) => true,
              value: () => ({ ...original, name: formData.name }),
            })
            const result = await execute(formData)
            // If result.isErr(), data stays wrong!
          }
        correct_pattern: |
          // Correct: rollback on error
          async function handleUpdate() {
            const original = queryClient.get(['contactDetail', { id }])
            queryClient.update(['contactDetail', { id }], {
              by: (item) => true,
              value: () => ({ ...original, name: formData.name }),
            })
            const result = await execute(formData)
            if (result.isErr()) {
              queryClient.set(['contactDetail', { id }], original) // Restore
              console.error(result.getError().message)
            }
          }
        source: 'docs: query-client.md edit form example'
        priority: 'CRITICAL'
        status: 'active'
        version_context: 'All versions'
      
      - mistake: 'Optimistic update but old query still refetches in background'
        mechanism: 'User sees optimistic update, then UI flickers back to server value'
        wrong_pattern: |
          // Wrong: update cache but dont prevent background refetch
          queryClient.update('contactDetail', ...)
          execute(formData) // Could trigger refetch during staleTime check
        correct_pattern: |
          // Correct: coordinate both optimistic AND invalidation
          // Either A: optimistic update without refetch
          queryClient.update('contactDetail', ...)
          // Or B: invalidate and refetch (no optimistic)
          await execute(formData)
          queryClient.invalidate('contactDetail')
          // Or C: update AND invalidate if mutation provides full data
          const result = await execute(formData)
          if (result.isOk()) {
            queryClient.set('contactDetail', result.getValue())
          }
        source: 'maintainer interview; TanStack Query best practices'
        priority: 'HIGH'
        status: 'active'
        version_context: 'All versions'
      
      - mistake: 'Skip defining explicit error codes; generic "error" message in UI'
        mechanism: 'Users see "error occurred" instead of actionable feedback ("email already exists")'
        wrong_pattern: |
          // Wrong: default generic error
          export type ERROR_KEYS = never // No error codes!
          // Backend returns error but no way to differentiate
          if (result.isErr()) {
            toast.error('Operation failed') // Nobody knows why
          }
        correct_pattern: |
          // Correct: enumerate error codes
          export type ERROR_KEYS = 'INVALID_EMAIL' | 'EMAIL_EXISTS' | 'UNAUTHORIZED'
          if (result.isErr()) {
            const error = result.getError()
            if (error.code === 'EMAIL_EXISTS') {
              toast.error('That email is already registered')
            } else {
              toast.error('Operation failed')
            }
          }
        source: 'maintainer interview; docs installation'
        priority: 'MEDIUM'
        status: 'active'
        version_context: 'All versions'

  - name: 'Understanding Foundations'
    slug: 'foundations'
    domain: 'foundations'
    type: 'core'
    description: 'How AsyncResult (neverthrow) and @tanstack/vue-query are the bedrock of the library'
    packages:
      - '@wisemen/vue-core-api-utils'
    covers:
      - 'neverthrow Result<T, E> type'
      - 'Why Result types over exceptions'
      - '@tanstack/vue-query QueryClient'
      - 'Caching strategy (stale-while-revalidate)'
      - 'Query deduplication & background refetch'
      - 'Vue 3 reactivity (Ref, Computed, watch)'
    tasks:
      - 'Understand why AsyncResult is safer than throw/catch'
      - 'Understand how TanStack Query shares cache across components'
      - 'Understand when cache is stale and how background refetch works'
      - 'Know which TanStack Query docs apply to wrapped composables'
    failure_modes:
      - mistake: 'Treat AsyncResult like a Promise; try/catch mutations'
        mechanism: 'Mutation doesnt throw; error silently returned in AsyncResult; catch never fires'
        wrong_pattern: |
          // Wrong: AsyncResult doesnt throw
          try {
            const result = await execute(formData)
            // Even if mutation fails, result is AsyncResult, not thrown
          } catch (error) {
            // Never reached!
          }
        correct_pattern: |
          // Correct: check AsyncResult state
          const result = await execute(formData)
          if (result.isErr()) {
            const error = result.getError()
            // Handle error
          }
        source: 'docs: result-types.md comparison'
        priority: 'HIGH'
        status: 'active'
        version_context: 'All versions'
      
      - mistake: 'Assume each component gets its own query cache'
        mechanism: 'Multiple components share the same cache; mutations in one invalidate all'
        wrong_pattern: |
          // Wrong: expecting isolated caches
          // ComponentA
          const { result: resultA } = useQuery('userDetail', {
            params: { id: 'same-id' },
            ...
          })
          // ComponentB
          const { result: resultB } = useQuery('userDetail', {
            params: { id: 'same-id' },
            ...
          })
          // resultA and resultB are the SAME cached value!
          // Mutation in B invalidates A's cache
        correct_pattern: |
          // Correct: embrace shared cache
          // This is a feature, not a bug
          // Use queryKeysToInvalidate to control invalidation
          // Use different query keys for different intent
          const { result } = useQuery('userDetail', { ... })
          const { result: userFormData } = useQuery('userDetailForEdit', { ... })
          // Same data, different cache keys = separate loading states
        source: 'TanStack Query docs; maintainer interview'
        priority: 'HIGH'
        status: 'active'
        version_context: 'All versions'

tensions:
  - name: 'Getting Started simplicity vs. Production robustness'
    skills: ['getting-started', 'writing-queries', 'cache-management']
    description: 'Quick queries work with minimal config, but production apps need cache invalidation, staleTime tuning, and prefetching'
    implication: 'Agents scaffolding initial queries will miss staleTime and queryKeysToInvalidate, causing stale data bugs after deployment'
  
  - name: 'Optimistic updates vs. Data consistency'
    skills: ['optimistic-uis', 'cache-management']
    description: 'Optimistic updates feel fast but risk showing wrong data if mutations fail; requires explicit rollback patterns'
    implication: 'Agents will implement optimistic updates without rollback, leaving users with corrupt state on error'
  
  - name: 'Type safety vs. Setup verbosity'
    skills: ['getting-started', 'asyncresult-handling']
    description: 'Full type safety requires defining ProjectQueryKeys and ERROR_KEYS, adding boilerplate that slows initial setup'
    implication: 'Agents will skip error codes or query key interfaces to reduce typing, losing type safety'
  
  - name: 'AsyncResult exhaustiveness vs. backwards-compatible flags'
    skills: ['asyncresult-handling', 'writing-queries']
    description: 'Composables export both AsyncResult (exhaustive) and isLoading/isError flags (convenient but incomplete)'
    implication: 'Agents mix the two approaches, creating logic bugs where AsyncResult.isLoading is true but flags are false'

