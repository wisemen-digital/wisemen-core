library:
  name: 'formango'
  version: '3.2.1'
  repository: 'https://github.com/wisemen-digital/wisemen-core'
  description: 'Headless, type-safe Vue 3 form validation library built on Standard Schema spec, supporting Zod, Valibot, and ArkType'
  primary_framework: 'Vue 3'

domains:
  - name: 'Form Creation & Field Binding'
    slug: 'form-binding'
    description: 'Defining schemas, creating forms with useForm, registering fields, and binding them to UI components'

  - name: 'Dynamic Collections'
    slug: 'dynamic-collections'
    description: 'Managing array-type form data with registerArray — adding, removing, reordering, and rendering dynamic field lists'

  - name: 'Validation & Error Handling'
    slug: 'validation-errors'
    description: 'Schema-driven validation, error display, external/server errors, i18n, conditional validation with refine/superRefine'

skills:
  - name: 'Form Setup & Field Binding'
    slug: 'form-setup'
    domain: 'form-binding'
    type: 'core'
    description: 'Create a schema, call useForm, register fields, build a toFormField mapper, compose subforms by passing Field to child components'
    packages:
      - 'formango'
    covers:
      - 'useForm composable'
      - 'UseFormOptions interface (schema, initialState, onSubmit, onSubmitError)'
      - 'Form object (state, isDirty, isSubmitting, isValid, hasAttemptedToSubmit, submit, reset, setValues, blurAll)'
      - 'form.register(path, defaultValue)'
      - 'Field interface (modelValue, value, errors, isDirty, isTouched, isChanged, isValid, onBlur, onChange, onUpdate:modelValue, setValue)'
      - 'toFormField mapper pattern'
      - 'Subforms via field.register() in child components'
      - 'form.unregister(path)'
      - 'Standard Schema V1 (Zod, Valibot, ArkType)'
    tasks:
      - 'Create a form with schema validation'
      - 'Register fields and bind to custom inputs'
      - 'Build a toFormField mapper function'
      - 'Compose reusable subform components'
      - 'Handle form submission with typed data'
      - 'Set initial state and reset form'
      - 'Use conditional validation with Zod refine/superRefine'
    failure_modes:
      - mistake: 'Destructuring form from useForm (v2 pattern)'
        mechanism: 'In v3, useForm returns the Form object directly. Agents trained on v2 code destructure { form } which produces undefined.'
        wrong_pattern: |
          const { form } = useForm({ schema, onSubmit })
        correct_pattern: |
          const form = useForm({ schema, onSubmit })
        source: 'CHANGELOG.md v3.0.0 breaking change'
        priority: 'CRITICAL'
        status: 'active'
        version_context: 'Changed in v3.0.0 — agents trained on v2 code will produce the old pattern'
      - mistake: 'Using onSubmitForm instead of onSubmit'
        mechanism: 'v3 renamed onSubmitForm to onSubmit and onSubmitFormError to onSubmitError. Old callback names are silently ignored.'
        wrong_pattern: |
          const form = useForm({
            schema,
            onSubmitForm: (data) => { /* ... */ },
          })
        correct_pattern: |
          const form = useForm({
            schema,
            onSubmit: (data) => { /* ... */ },
          })
        source: 'CHANGELOG.md v3.0.0 breaking change'
        priority: 'CRITICAL'
        status: 'active'
        version_context: 'Renamed in v3.0.0'
      - mistake: 'Accessing field values without .value'
        mechanism: 'Field properties like modelValue, errors, isDirty, isTouched are ComputedRef — they require .value in script but are auto-unwrapped in templates.'
        wrong_pattern: |
          if (name.isDirty) { /* always truthy — it is the ref object */ }
        correct_pattern: |
          if (name.isDirty.value) { /* correct boolean check */ }
        source: 'source: src/types/form.type.ts — Field interface uses ComputedRef'
        priority: 'HIGH'
        status: 'active'
      - mistake: 'Not passing Field to subform component'
        mechanism: 'Agents create a separate useForm in child components instead of accepting a Field prop and calling field.register() for nested paths. This breaks the parent form state.'
        wrong_pattern: |
          <!-- AddressForm.vue — WRONG -->
          <script setup>
          const form = useForm({ schema: addressSchema, onSubmit })
          const street = form.register('street')
          </script>
        correct_pattern: |
          <!-- AddressForm.vue — CORRECT -->
          <script setup>
          const { address } = defineProps<{ address: Field<Address> }>()
          const street = address.register('street')
          </script>
        source: 'docs/packages/formango/examples/subforms.md'
        priority: 'CRITICAL'
        status: 'active'
      - mistake: 'Using initialData instead of initialState'
        mechanism: 'The option is named initialState, not initialData. Passing initialData is silently ignored and the form starts empty.'
        wrong_pattern: |
          const form = useForm({
            schema,
            initialData: { name: 'test' },
            onSubmit,
          })
        correct_pattern: |
          const form = useForm({
            schema,
            initialState: { name: 'test' },
            onSubmit,
          })
        source: 'source: src/lib/useForm.ts — UseFormOptions interface'
        priority: 'HIGH'
        status: 'active'
    compositions:
      - library: 'Zod'
        skill: 'form-setup'
      - library: 'Valibot'
        skill: 'form-setup'
      - library: 'ArkType'
        skill: 'form-setup'

  - name: 'Array Fields'
    slug: 'array-fields'
    domain: 'dynamic-collections'
    type: 'core'
    description: 'Use registerArray to manage dynamic lists — iterate fields, register items by index, add/remove/reorder with array methods'
    packages:
      - 'formango'
    covers:
      - 'form.registerArray(path, defaultValue)'
      - 'FieldArray interface'
      - 'FieldArray.fields (array of unique ids for v-for)'
      - 'FieldArray.append / prepend / insert / remove / pop / shift / move / empty / setValue'
      - 'FieldArray.register(indexPath) for child fields'
      - 'FieldArray.registerArray for nested arrays'
      - 'FieldArray.isDirty / isTouched / isValid / errors / modelValue / value'
    tasks:
      - 'Register an array field'
      - 'Render dynamic list with v-for over fields'
      - 'Add items with append/prepend/insert'
      - 'Remove items with remove/pop/shift'
      - 'Reorder items with move'
      - 'Register child fields inside array items'
      - 'Handle nested arrays'
    failure_modes:
      - mistake: 'Using register instead of registerArray for arrays'
        mechanism: 'Agents use form.register for array schema fields, which creates a single Field instead of a FieldArray. The array manipulation methods (append, remove, etc.) are missing.'
        wrong_pattern: |
          const emails = form.register('emails')
          // emails.append is undefined
        correct_pattern: |
          const emails = form.registerArray('emails')
          emails.append('new@email.com')
        source: 'docs/packages/formango/api/field-array.md'
        priority: 'CRITICAL'
        status: 'active'
      - mistake: 'Using array index as v-for key instead of field id'
        mechanism: 'FieldArray.fields provides unique string ids for each item. Using the numeric index as :key causes Vue to reuse wrong DOM elements when items are removed or reordered.'
        wrong_pattern: |
          <div v-for="(_, index) in emails.fields" :key="index">
        correct_pattern: |
          <div v-for="(emailField, index) in emails.fields" :key="emailField">
        source: 'docs/packages/formango/api/field-array.md'
        priority: 'HIGH'
        status: 'active'
      - mistake: 'Registering array children with wrong path syntax'
        mechanism: 'When registering fields inside an array item, the path is the index as a string (e.g. `${index}`), not dot-prefixed. Agents often use the full path from the root instead of relative to the FieldArray.'
        wrong_pattern: |
          // From inside a child component receiving FieldArray
          const email = emails.register(`emails.${index}`)
        correct_pattern: |
          const email = emails.register(`${index}`)
        source: 'docs/packages/formango/api/field-array.md — ExampleArrayField.vue'
        priority: 'HIGH'
        status: 'active'
      - mistake: 'Not using FieldArray methods for mutation'
        mechanism: 'Agents try to mutate the array directly (e.g. splice, push on modelValue) instead of using FieldArray methods. Direct mutation bypasses internal path tracking and breaks form state.'
        wrong_pattern: |
          emails.modelValue.value.push('new@email.com')
        correct_pattern: |
          emails.append('new@email.com')
        source: 'source: src/lib/useForm.ts — createFieldArray'
        priority: 'HIGH'
        status: 'active'

  - name: 'Validation & Error Handling'
    slug: 'validation-errors'
    domain: 'validation-errors'
    type: 'core'
    description: 'Schema-driven validation, error display, external/server errors, i18n, conditional validation with refine/superRefine'
    packages:
      - 'formango'
    covers:
      - 'Automatic validation on form state change (deep watcher)'
      - 'Form.errors / Form.rawErrors'
      - 'Field.errors / Field.rawErrors'
      - 'formatErrorsToZodFormattedError helper'
      - 'Form.addErrors for server-side errors'
      - 'Form.isValid / Field.isValid'
      - 'Field.isDirty vs Field.isChanged vs Field.isTouched'
      - 'Form.hasAttemptedToSubmit'
      - 'Form.blurAll'
      - 'Form.reset'
      - 'onSubmitError callback'
      - 'Zod refine / superRefine for cross-field validation'
      - 'Zod custom error map for i18n'
    tasks:
      - 'Display field validation errors in custom inputs'
      - 'Set up i18n for error messages with Zod error map'
      - 'Handle server-side validation errors with addErrors'
      - 'Use conditional/cross-field validation with refine'
      - 'Show errors only after field is touched or form submitted'
      - 'Reset form to initial state'
      - 'Check form dirty state before navigation'
    failure_modes:
      - mistake: 'Passing raw errors directly to ZodFormattedError consumers'
        mechanism: 'Field.errors returns FormattedError[] (array of {message, path}), not ZodFormattedError. Agents need to use formatErrorsToZodFormattedError to convert before passing to components that expect the Zod shape with _errors arrays.'
        wrong_pattern: |
          // In toFormField mapper
          errors: field.errors.value  // FormattedError[] — wrong shape
        correct_pattern: |
          errors: formatErrorsToZodFormattedError(field.errors.value)
        source: 'docs/packages/formango/api/field.md — toFormField example'
        priority: 'HIGH'
        status: 'active'
      - mistake: 'Confusing isDirty and isChanged'
        mechanism: 'isDirty compares current value to initial value (reverts to false if reset). isChanged is a flag that stays true once any change occurs, even if value returns to initial. Agents use them interchangeably.'
        wrong_pattern: |
          // Using isChanged to guard navigation — stays true even after undo
          if (field.isChanged.value) showUnsavedWarning()
        correct_pattern: |
          // Use isDirty — reflects actual difference from initial value
          if (field.isDirty.value) showUnsavedWarning()
        source: 'source: src/types/form.type.ts — Field interface JSDoc'
        priority: 'MEDIUM'
        status: 'active'
      - mistake: 'Calling addErrors with wrong path format'
        mechanism: 'addErrors expects an array of { path: string, message: string } where path is dot-notation. Agents pass Zod-style path arrays or miss the path entirely.'
        wrong_pattern: |
          form.addErrors([{ path: ['email'], message: 'Invalid' }])
        correct_pattern: |
          form.addErrors([{ path: 'email', message: 'Invalid' }])
        source: 'docs/packages/formango/examples/external-errors.md'
        priority: 'HIGH'
        status: 'active'

tensions:
  - name: 'Headless flexibility vs. boilerplate'
    skills: ['form-setup', 'validation-errors']
    description: 'Formango is headless — it provides no UI. Every project must build a toFormField mapper and custom inputs. This gives flexibility but agents must know the mapper pattern.'
    implication: 'An agent that only considers form-setup will generate fields without a mapper, producing code that does not bind correctly to any input component.'

  - name: 'Standard Schema generality vs. Zod-specific features'
    skills: ['form-setup', 'validation-errors']
    description: 'Formango uses Standard Schema V1 internally, but formatErrorsToZodFormattedError and i18n error maps are Zod-specific. The schema library choice affects error handling.'
    implication: 'An agent may use formatErrorsToZodFormattedError with Valibot errors or assume Zod error map works with all schemas.'

cross_references:
  - from: 'form-setup'
    to: 'array-fields'
    reason: 'Forms with dynamic lists need registerArray; agents loading form-setup should know when to reach for array-fields instead of register'
  - from: 'form-setup'
    to: 'validation-errors'
    reason: 'Every form needs error display; the toFormField mapper bridges form-setup and validation-errors'
  - from: 'array-fields'
    to: 'validation-errors'
    reason: 'Array field errors are scoped to each item; understanding error propagation requires both skills'

