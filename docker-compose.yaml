services:
  postgres:
    image: postgis/postgis:16-3.5-alpine
    platform: linux/amd64
    container_name: postgres-development
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/home/postgres/pgdata/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: test_db

volumes:
  postgres-data:
